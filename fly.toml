app = "nurtureplus-backend"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  LOG_LEVEL = "INFO"
  ALLOWED_ORIGINS = "https://nurtureplus-backend.fly.dev"
  DEV_BYPASS_AUTH = "false"
