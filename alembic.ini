# Alembic Configuration File for Nurture+ Backend

[alembic]
# path to migration scripts
sqlalchemy.url = driver://user:pass@localhost/dbname

# Location of migration scripts
script_location = alembic

# Defaults to plaintext, but you can use "sqla.url" to avoid exposing passwords
# sqlalchemy.url_placeholder = PostgreSQL DB
migration_file_template = %%(rev)s_%%(slug)s.py
file_template = %%(rev)s_%%(slug)s.py

sqlalchemy.echo = false
sqlalchemy.echo_pool = false
sqlalchemy.pool_pre_ping = true
sqlalchemy.pool_recycle = 3600

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
